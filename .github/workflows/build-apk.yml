name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔍 Find project structure
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== Finding gradlew ==="
          find . -name "gradlew" -type f

      - name: 🔧 Make Gradle Executable and Build APK
        run: |
          GRADLEW_PATH=$(find . -name "gradlew" -type f | head -1)
          echo "Found gradlew at: $GRADLEW_PATH"
          PROJECT_DIR=$(dirname "$GRADLEW_PATH")
          echo "Project directory: $PROJECT_DIR"
          chmod +x "$GRADLEW_PATH"
          cd "$PROJECT_DIR"
          ./gradlew assembleDebug --stacktrace

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI-Resume-Builder-APK
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
          retention-days: 30
