name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Show full folder structure
        run: find . -not -path '*/\.*' -type f | head -50

      - name: Make Gradle Executable and Build APK
        run: |
          GRADLEW_PATH=$(find . -name "gradlew" -not -path '*/\.*' | head -1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "ERROR: gradlew not found!"
            exit 1
          fi
          echo "Found gradlew at: $GRADLEW_PATH"
          PROJECT_DIR=$(dirname "$GRADLEW_PATH")
          echo "Building in: $PROJECT_DIR"
          chmod +x "$GRADLEW_PATH"
          cd "$PROJECT_DIR"
          ./gradlew assembleDebug --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI-Resume-Builder-APK
          path: "**/outputs/apk/debug/*.apk"
          retention-days: 30
